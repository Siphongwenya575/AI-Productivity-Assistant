<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>AI Productivity Assistant</h1>
        <p>Your workplace assistant for emails, meetings, task planning, and smart chat.</p>
    </header>

    <main class="container">
        <!-- Email Generator Card -->
        <section class="card">
            <h2>✉️ Email Generator</h2>
            <textarea id="email-input" placeholder="Describe the email you want to create (e.g., Request a deadline extension from my manager)..."></textarea>
            <button onclick="generateEmail()">Generate Email</button>
            <div id="email-output" class="output-box hidden"></div>
        </section>

        <!-- Meeting Notes Summarizer Card -->
        <section class="card">
            <h2>📝 Meeting Notes Summarizer</h2>
            <textarea id="notes-input" placeholder="Paste meeting notes here..."></textarea>
            <button onclick="summarizeNotes()">Summarize Notes</button>
            <div id="notes-output" class="output-box hidden"></div>
        </section>

        <!-- Task Planner Card -->
        <section class="card">
            <h2>📅 Task Planner</h2>
            <textarea id="tasks-input" placeholder="Enter your tasks (e.g., Prepare slides, review budget, team sync)..."></textarea>
            <button onclick="createSchedule()">Create Schedule</button>
            <div id="tasks-output" class="output-box hidden"></div>
        </section>

        <!-- AI Chatbot Card -->
        <section class="card">
            <h2>🤖 AI Chatbot</h2>
            <textarea id="chat-input" placeholder="Ask a workplace question..."></textarea>
            <button onclick="sendMessage()">Send Message</button>
            <div id="chat-output" class="output-box hidden"></div>
        </section>
    </main>

    <footer class="footer">
        <p><small><strong>Responsible AI Disclaimer:</strong> AI-generated outputs should be reviewed and verified prior to professional use.</small></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
